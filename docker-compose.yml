services:
  n8n-mcp:
    build: .
    container_name: n8n-mcp
    restart: unless-stopped
    ports:
      - "3106:3000"
    volumes:
      - oauth-data:/data
    environment:
      - TRANSPORT=http
      - PORT=3000
      - N8N_API_URL=${N8N_API_URL}
      - N8N_API_KEY=${N8N_API_KEY}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - MCP_SERVER_URL=${MCP_SERVER_URL}

volumes:
  oauth-data:
